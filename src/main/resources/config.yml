# ============================================================
#                     НАСТРОЙКИ РЫБАЛКИ
# ============================================================

# Время (в секундах) на вытаскивание рыбы после мини-игры
timeout-seconds: 25

# Скорость курсора: base + random(0..range)
cursor-speed-base: 0.35
cursor-speed-range: 0.25

# Биомы считающиеся океанскими (остальные — пресноводные)
ocean-biomes:
  - OCEAN
  - DEEP_OCEAN
  - COLD_OCEAN
  - DEEP_COLD_OCEAN
  - FROZEN_OCEAN
  - DEEP_FROZEN_OCEAN
  - LUKEWARM_OCEAN
  - DEEP_LUKEWARM_OCEAN
  - WARM_OCEAN
  - BEACH
  - STONY_SHORE
  - SNOWY_BEACH

# Паттерны мини-игры (G=зелёный, Y=жёлтый, R=красный)
patterns:
  - "RRRYYYYGGGGGYYYYRRYYYGGYY"
  - "RRYYYYGGGYYYYRRRRYYYYGG"
  - "RRRYYYGGGGYYYYYYRRRGG"
  - "RRYYYYYGGGGYYYYRRRYYY"
  - "GGGRRRGGGRRRGGGRRRGGGRRR"
  - "RRRGGGGGRRRGGGGGRRR"
  - "YYYYGGGYYYYGGGYYYYGGG"
  - "RRRRRYGGGGYRRRRR"
  - "GGGRRRRRRRRRGGG"
  - "RRYGGGYRRYGGGYRRYGGGYRR"

